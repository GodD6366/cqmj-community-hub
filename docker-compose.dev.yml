name: community-hub-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${HOST_DB_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-community_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-community_hub}"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    image: community-hub-dev-web:latest
    build:
      context: .
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-community_hub}?schema=public
      COMMUNITY_ADMIN_PASSWORD: ${COMMUNITY_ADMIN_PASSWORD:-admin}
      COMMUNITY_INVITE_CODES: ${COMMUNITY_INVITE_CODES:-WELCOME-2026,NEIGHBOR-2026}
      WATCHPACK_POLLING: "true"
      CI: "true"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_next_cache:/app/.next
      - dev_pnpm_store:/pnpm/store
    command: sh -lc "pnpm install --config.confirmModulesPurge=false && pnpm prisma generate && pnpm prisma db push && pnpm dev --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_dev_data:
  dev_node_modules:
  dev_next_cache:
  dev_pnpm_store:
